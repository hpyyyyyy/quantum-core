<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>Quantum Core - Fullscreen Immersive</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
            /* 防止移动端回弹和意外滚动 */
            position: fixed;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        /* 提示层：点击进入全屏 */
        #hint {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: rgba(255, 255, 255, 0.4);
            font-family: sans-serif;
            font-size: 12px;
            letter-spacing: 2px;
            pointer-events: none;
            animation: fadeOut 4s forwards;
        }

        @keyframes fadeOut {
            0% {
                opacity: 1
            }

            80% {
                opacity: 1
            }

            100% {
                opacity: 0
            }
        }
    </style>
</head>

<body>
    <div id="hint">点击屏幕进入沉浸模式 / ESC 退出</div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // =========================================================
        // 原始配置面板
        // =========================================================
        const CONFIG = {
            coreSize: 2.3,
            coreDensity: 2000,
            coreParticleSize: 0.9,
            customOrbits: [
                { rx: 16.5, ry: 7.5, rotX: 0.3, rotY: 0.0, rotZ: 0.785 },
                { rx: 16.5, ry: 7.5, rotX: 0.3, rotY: 0.0, rotZ: -0.785 },
                { rx: 20.0, ry: 9.0, rotX: 0.2, rotY: 0.0, rotZ: 0.524 },
                { rx: 20.0, ry: 9.0, rotX: 0.2, rotY: 0.0, rotZ: -0.524 },
                { rx: 13.0, ry: 6.0, rotX: 0.15, rotY: 0.0, rotZ: 0.1 },
                { rx: 23.0, ry: 10.0, rotX: 0.25, rotY: 0.0, rotZ: 0.05 }
            ],
            orbitDensity: 4000,
            orbitWidth: 1,
            orbitFlowSpeed: 0.05,
            orbitParticleSize: 0.5,
            dissipationAmount: 0.02,
            minBrightness: 1,
            bloomStrength: 3
        };

        let scene, camera, renderer, composer, clock;
        const orbitMats = [];
        let coreMat;

        // 着色器
        const orbitVertexShader = `
        varying vec3 vColor; varying float vOpacity;
        uniform float uTime; uniform float uFlowSpeed; uniform float uBaseSize;
        uniform float uMinBright; uniform float uMaxBright;
        attribute float aAngle; attribute float aRadiusX; attribute float aRadiusY;
        attribute float aZOffset; attribute float aRandom; attribute float aIsDissipate;
        attribute vec3 aOrbitRot;
        vec3 rotate(vec3 p, vec3 r) {
            mat3 mx = mat3(1,0,0, 0,cos(r.x),-sin(r.x), 0,sin(r.x),cos(r.x));
            mat3 my = mat3(cos(r.y),0,sin(r.y), 0,1,0, -sin(r.y),0,cos(r.y));
            mat3 mz = mat3(cos(r.z),-sin(r.z),0, sin(r.z),cos(r.z),0, 0,0,1);
            return mx * my * mz * p;
        }
        void main() {
            vColor = color;
            float currentAngle = aAngle + uTime * uFlowSpeed * (0.8 + aRandom * 0.4);
            vec3 pos = vec3(cos(currentAngle) * aRadiusX, sin(currentAngle) * aRadiusY, aZOffset);
            float localOpacity = 1.0;
            if(aIsDissipate > 0.5) {
                float dissCycle = fract(uTime * 0.15 + aRandom); 
                pos.y += dissCycle * 4.0;
                localOpacity = 1.0 - dissCycle;
            }
            pos = rotate(pos, aOrbitRot);
            float sparkle = sin(uTime * 0.5 + aRandom * 10.0);
            float brightness = mix(uMinBright, uMaxBright, sparkle * 0.5 + 0.5);
            vOpacity = brightness * localOpacity;
            vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
            gl_PointSize = uBaseSize * brightness * (450.0 / -mvPosition.z);
            gl_Position = projectionMatrix * mvPosition;
        }
        `;

        const fragmentShader = `
        varying vec3 vColor; varying float vOpacity;
        void main() {
            float d = distance(gl_PointCoord, vec2(0.5));
            if (d > 0.5) discard;
            gl_FragColor = vec4(vColor * 1.5, pow(1.0 - d * 2.0, 2.0) * vOpacity);
        }
        `;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 28;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            const renderPass = new RenderPass(scene, camera);
            const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), CONFIG.bloomStrength, 0.4, 0.85);
            composer = new EffectComposer(renderer);
            composer.addPass(renderPass);
            composer.addPass(bloomPass);

            clock = new THREE.Clock();
            createCore();
            CONFIG.customOrbits.forEach((cfg) => createCustomOrbit(cfg));
            animate();
        }

        // 辅助函数
        function createCore() {
            const geo = new THREE.BufferGeometry();
            const pos = [], cols = [], sizes = [], rans = [];
            for (let i = 0; i < CONFIG.coreDensity; i++) {
                const phi = Math.random() * Math.PI * 2;
                const theta = Math.acos(Math.random() * 2 - 1);
                const r = Math.pow(Math.random(), 0.8) * CONFIG.coreSize;
                pos.push(r * Math.sin(theta) * Math.cos(phi), r * Math.sin(theta) * Math.sin(phi), r * Math.cos(theta));
                cols.push(1.0, 0.9, 0.6);
                sizes.push(Math.random() * CONFIG.coreParticleSize + 0.1);
                rans.push(Math.random());
            }
            geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
            geo.setAttribute('color', new THREE.Float32BufferAttribute(cols, 3));
            geo.setAttribute('aSize', new THREE.Float32BufferAttribute(sizes, 1));
            geo.setAttribute('aRandom', new THREE.Float32BufferAttribute(rans, 1));
            coreMat = new THREE.ShaderMaterial({
                uniforms: { uTime: { value: 0 }, uMinBright: { value: CONFIG.minBrightness }, uMaxBright: { value: CONFIG.maxBrightness } },
                vertexShader: `varying vec3 vColor; varying float vOpacity; uniform float uTime; uniform float uMinBright; uniform float uMaxBright; attribute float aSize; attribute float aRandom; void main() { vColor = color; float sparkle = sin(uTime * 0.6 + aRandom * 10.0); vOpacity = mix(uMinBright, uMaxBright, sparkle * 0.5 + 0.5); vec4 mvPosition = modelViewMatrix * vec4(position, 1.0); gl_PointSize = aSize * vOpacity * (400.0 / -mvPosition.z); gl_Position = projectionMatrix * mvPosition; }`,
                fragmentShader, transparent: true, blending: THREE.AdditiveBlending, depthWrite: false, vertexColors: true
            });
            scene.add(new THREE.Points(geo, coreMat));
        }

        function createCustomOrbit(cfg) {
            const geo = new THREE.BufferGeometry();
            const cols = [], rans = [], angles = [], rx = [], ry = [], zoff = [], isDiss = [], orbitRotAttr = [];
            for (let i = 0; i < CONFIG.orbitDensity; i++) {
                angles.push(Math.random() * Math.PI * 2);
                rx.push(cfg.rx + (Math.random() - 0.5) * CONFIG.orbitWidth);
                ry.push(cfg.ry + (Math.random() - 0.5) * CONFIG.orbitWidth);
                zoff.push((Math.random() - 0.5) * CONFIG.orbitWidth);
                cols.push(1.0, 0.85, 0.4);
                rans.push(Math.random());
                isDiss.push(Math.random() < CONFIG.dissipationAmount ? 1.0 : 0.0);
                orbitRotAttr.push(cfg.rotX, cfg.rotY, cfg.rotZ);
            }
            geo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(CONFIG.orbitDensity * 3), 3));
            geo.setAttribute('aAngle', new THREE.Float32BufferAttribute(angles, 1));
            geo.setAttribute('aRadiusX', new THREE.Float32BufferAttribute(rx, 1));
            geo.setAttribute('aRadiusY', new THREE.Float32BufferAttribute(ry, 1));
            geo.setAttribute('aZOffset', new THREE.Float32BufferAttribute(zoff, 1));
            geo.setAttribute('aRandom', new THREE.Float32BufferAttribute(rans, 1));
            geo.setAttribute('aIsDissipate', new THREE.Float32BufferAttribute(isDiss, 1));
            geo.setAttribute('aOrbitRot', new THREE.Float32BufferAttribute(orbitRotAttr, 3));
            geo.setAttribute('color', new THREE.Float32BufferAttribute(cols, 3));
            const mat = new THREE.ShaderMaterial({
                uniforms: { uTime: { value: 0 }, uFlowSpeed: { value: CONFIG.orbitFlowSpeed }, uBaseSize: { value: CONFIG.orbitParticleSize }, uMinBright: { value: CONFIG.minBrightness }, uMaxBright: { value: CONFIG.maxBrightness } },
                vertexShader: orbitVertexShader, fragmentShader, transparent: true, blending: THREE.AdditiveBlending, depthWrite: false, vertexColors: true
            });
            scene.add(new THREE.Points(geo, mat));
            orbitMats.push(mat);
        }

        function animate() {
            requestAnimationFrame(animate);
            const elapsed = clock.getElapsedTime();
            if (coreMat) coreMat.uniforms.uTime.value = elapsed;
            orbitMats.forEach(m => m.uniforms.uTime.value = elapsed);
            composer.render();
        }

        // =========================================================
        // 全屏
        // =========================================================
        window.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(e => console.log(e));
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>

</html>
